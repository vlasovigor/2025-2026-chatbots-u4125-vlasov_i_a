version: '3.8'

services:
  # Основной сервис бота
  finance-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-bot
    restart: unless-stopped
    
    # Переменные окружения
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PYTHONUNBUFFERED=1
    
    # Монтирование томов для сохранения данных
    volumes:
      # База данных
      - ./finance_bot.db:/app/finance_bot.db
      # Логи
      - ./logs:/app/logs
      # Данные
      - ./data:/app/data
    
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Проверка здоровья контейнера
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/finance_bot.db') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Сеть
    networks:
      - finance-bot-network

# Сеть для контейнеров
networks:
  finance-bot-network:
    driver: bridge

# Именованные тома для сохранения данных
volumes:
  bot-data:
    driver: local
